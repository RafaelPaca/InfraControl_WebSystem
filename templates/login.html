{% extends "base.html" %}
{% block title %}Login - InfraControl{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-box" id="login-box">
        <h2>Acesso ao Sistema</h2>
        <form method="POST" action="{{ url_for('main.login') }}" aria-label="Formulário de Login">
            <div class="form-group">
                <label for="nome">E-mail ou Nome de Usuário:</label>
                <input type="text" id="nome" name="nome" required aria-required="true" class="input-field">
            </div>
            <div class="form-group">
                <label for="senha">Senha:</label>
                <input type="password" id="senha" name="senha" required aria-required="true" class="input-field">
            </div>
            <div class="auth-buttons">
                <button type="submit" class="btn btn-primary">Entrar</button>
                <button type="button" class="btn btn-secondary" onclick="toggleAuthMode('register')">Cadastrar</button>
            </div>
            <div class="forgot-password">
                <button type="button" class="btn btn-link" onclick="toggleAuthMode('forgot')">Esqueci a Senha</button>
            </div>
        </form>
    </div>

    <div class="auth-box" id="register-box" style="display: none;">
        <h2>Cadastro de Usuário</h2>
        <form method="POST" action="{{ url_for('main.register') }}" aria-label="Formulário de Cadastro">
            <div class="form-group">
                <label for="reg-nome">Nome:</label>
                <input type="text" id="reg-nome" name="nome" required aria-required="true" class="input-field">
            </div>
            <div class="form-group">
                <label for="reg-sobrenome">Sobrenome:</label>
                <input type="text" id="reg-sobrenome" name="sobrenome" required aria-required="true" class="input-field">
            </div>
            <div class="form-group">
                <label for="cpf">CPF:</label>
                <input type="text" id="cpf" name="cpf" required aria-required="true" class="input-field">
            </div>
            <div class="form-group">
                <label for="data_nascimento">Data de Nascimento:</label>
                <input type="date" id="data_nascimento" name="data_nascimento" required aria-required="true" class="input-field">
            </div>
            <div class="form-group">
                <label for="email">E-mail Corporativo:</label>
                <input type="email" id="email" name="email" required aria-required="true" class="input-field">
            </div>
            <div class="form-group">
                <label for="reg-senha">Senha:</label>
                <input type="password" id="reg-senha" name="senha" required aria-required="true" class="input-field">
            </div>
            <div class="auth-buttons">
                <button type="submit" class="btn btn-primary">Cadastrar</button>
                <button type="button" class="btn btn-secondary" onclick="toggleAuthMode('login')">Voltar ao Login</button>
            </div>
        </form>
    </div>

    <div class="auth-box" id="forgot-box" style="display: none;">
        <h2>Redefinir Senha</h2>
        <form action="#" aria-label="Formulário de Redefinição de Senha">
            <div class="form-group">
                <label for="forgot-email">E-mail Corporativo:</label>
                <input type="email" id="forgot-email" name="email" required aria-required="true" class="input-field">
            </div>
            <div class="form-group">
                <label for="new-senha">Nova Senha:</label>
                <input type="password" id="new-senha" name="new-senha" required aria-required="true" class="input-field">
            </div>
            <div class="form-group">
                <label for="repeat-senha">Repetir Nova Senha:</label>
                <input type="password" id="repeat-senha" name="repeat-senha" required aria-required="true" class="input-field">
            </div>
            <div class="auth-buttons">
                <button type="button" class="btn btn-primary" onclick="alert('Senha redefinida com sucesso! (Simulado)')">Salvar</button>
                <button type="button" class="btn btn-secondary" onclick="toggleAuthMode('login')">Cancelar</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    function toggleAuthMode(mode) {
        document.getElementById('login-box').style.display = mode === 'login' ? 'block' : 'none';
        document.getElementById('register-box').style.display = mode === 'register' ? 'block' : 'none';
        document.getElementById('forgot-box').style.display = mode === 'forgot' ? 'block' : 'none';
    }
</script>
{% endblock %}

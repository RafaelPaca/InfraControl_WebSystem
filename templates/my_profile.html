{% extends "base.html" %}

{% block title %}Meu Perfil - InfraControl{% endblock %}

{% block content %}

<div class="dashboard-header">
    <h2>Meu Perfil</h2>
</div>

<div class="dashboard-section">

    <form method="POST" class="modern-form">

        <div class="form-row">

            <div class="form-group">
                <label>Nome:</label>
                <input type="text"
                       class="input-field"
                       value="{{ current_user.nome }}"
                       readonly>
            </div>

            <div class="form-group">
                <label>Sobrenome:</label>
                <input type="text"
                       class="input-field"
                       value="{{ current_user.sobrenome }}"
                       readonly>
            </div>

        </div>

        <div class="form-row">

            <div class="form-group">
                <label>CPF:</label>
                <input type="text"
                       class="input-field"
                       value="{{ current_user.cpf }}"
                       readonly>
            </div>

            <div class="form-group">
                <label>Data de Nascimento:</label>
                <input type="text"
                       class="input-field"
                       value="{{ current_user.data_nascimento.strftime('%d/%m/%Y') }}"
                       readonly>
            </div>

        </div>

        <div class="form-group">
            <label for="email">E-mail Corporativo:</label>
            <input type="email"
                   id="email"
                   name="email"
                   class="input-field"
                   value="{{ current_user.email_corporativo }}"
                   required>
        </div>

        <div class="form-group">
            <label for="senha">Nova Senha:</label>
            <input type="password"
                   id="senha"
                   name="senha"
                   class="input-field"
                   placeholder="Digite uma nova senha">
        </div>

        <div class="form-actions">

            <button type="submit"
                    class="btn btn-primary">
                Salvar
            </button>

            <a href="{{ url_for('main.index') }}"
               class="btn btn-secondary">
                Cancelar
            </a>

        </div>

    </form>

</div>

{% endblock %}
